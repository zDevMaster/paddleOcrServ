<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>手写签名识别测试</title>
  <style>
    html{box-sizing:border-box}
    *,*::before,*::after{box-sizing:inherit}
    body{font-family:"Microsoft YaHei",Arial,sans-serif;margin:0;padding:16px;background:#f4f6f8;touch-action:manipulation;min-height:100%}
    .top{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:12px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
    input,select,button{height:36px;padding:4px 10px}
    .sign-wrap{background:#fff;border:1px solid #cbd5e1;border-radius:10px;padding:10px;margin-bottom:12px;max-width:720px}
    #signCanvas{display:block;width:100%;height:220px;background:#fff;border:1px dashed #94a3b8;border-radius:8px;touch-action:none;cursor:crosshair}
    .hint{color:#64748b;font-size:13px;margin-top:8px}
    .panel{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px}
    .result-panel{width:100%;max-width:none}
    .result-list{display:flex;flex-direction:column;gap:10px}
    .result-row{display:grid;grid-template-columns:minmax(200px,320px) 1fr;gap:14px;border:1px solid #e5e7eb;border-radius:8px;padding:10px;background:#fafafa;align-items:start}
    @media (max-width:720px){ .result-row{grid-template-columns:1fr} }
    .result-row .thumb-wrap{min-height:160px;display:flex;align-items:center;justify-content:center;background:#111827;border-radius:6px;padding:8px}
    .result-row .thumb-wrap img{max-width:100%;max-height:min(280px,50vh);width:auto;height:auto;object-fit:contain}
    .result-row .meta{font-size:13px;color:#334155;margin-bottom:6px;word-break:break-all}
    .result-row pre{margin:0;white-space:pre-wrap;word-break:break-word;background:#0b1020;color:#d1e7ff;padding:8px;border-radius:6px;font-size:11px}
    .pager{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
    .page-nav{display:flex;gap:8px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #e5e7eb}
    #submitInfo{display:block;max-width:100%;line-height:1.55;word-break:break-word;color:#334155;font-size:14px}
  </style>
</head>
<body>
  <div class="top">
    <div class="row">
      <strong>手写签名识别测试</strong>
      <a href="/" style="margin-left:8px">返回入口</a>
    </div>
    <div class="row">
      <label>OCR 服务地址</label>
      <input id="ocrBase" type="text" value="http://127.0.0.1:8000" style="min-width:260px" />
      <button id="btnHealth" type="button">检查 health</button>
    </div>
    <p class="hint" style="margin:0">测试站与 OCR<strong>同机</strong>时请务必填 <code>http://127.0.0.1:8000</code>，勿填本机局域网 IP。仅当浏览器访问的测试站与 OCR<strong>不在同一台电脑</strong>时，才填 <code>http://&lt;OCR那台机的IP&gt;:8000</code>。首图识别会加载模型，可能需等待几分钟。</p>
  </div>

  <div class="sign-wrap">
    <p style="margin:0 0 8px 0">在下方区域手写签名（支持触摸屏）。提交后以 <strong>纳秒时间戳（tick）</strong> 为文件名保存到 <code>test/data/HandWrite</code>，并调用通用 OCR 生成同名 <code>.json</code>。</p>
    <canvas id="signCanvas" width="700" height="220"></canvas>
    <div class="row" style="margin-top:10px">
      <button id="btnClear" type="button">清空画布</button>
      <button id="btnSubmit" type="button" style="background:#2563eb;color:#fff;border:0;border-radius:8px">提交识别</button>
      <div id="submitInfo"></div>
    </div>
    <p class="hint">若仅想补跑目录里尚未生成 json 的图片，可使用下方批量测试（与身份证测试相同规则）。</p>
  </div>

  <div class="top">
    <div class="row">
      <label>批次大小</label>
      <select id="batchSize">
        <option>5</option><option>10</option><option selected>20</option><option>50</option><option>100</option>
      </select>
      <button id="btnRun" type="button">批量测试（仅未生成 .json）</button>
      <span id="runInfo"></span>
    </div>
    <div class="row">
      <label>每页条数</label>
      <select id="pageSize">
        <option>10</option><option selected>20</option><option>30</option><option>50</option>
      </select>
      <button id="btnLoad" type="button">刷新列表</button>
      <span id="stats"></span>
    </div>
  </div>

  <div class="panel result-panel">
    <h3 style="margin-top:0">查看结果（按「每页条数」列出本页全部记录）</h3>
    <div id="resultList" class="result-list">等待加载...</div>
    <div class="page-nav">
      <button id="pagePrev" type="button">上一页</button>
      <span id="pageInfo"></span>
      <button id="pageNext" type="button">下一页</button>
    </div>
  </div>

  <script>
    const DOC_TYPE = "handwriting";
    let currentPage = 1, lastData = null;
    /** 每次拉取列表后更新，避免 <img> 沿用浏览器缓存的旧图 */
    let mediaBust = Date.now();
    const $ = (id) => document.getElementById(id);

    function formatApiErr(d) {
      if (!d || d.detail == null) return "";
      const x = d.detail;
      if (typeof x === "string") return x;
      if (Array.isArray(x)) return x.map((e) => (e.msg != null ? e.msg : JSON.stringify(e))).join(" ");
      return String(x);
    }

    const canvas = $("signCanvas");
    const ctx = canvas.getContext("2d");
    let drawing = false, lastX = 0, lastY = 0;

    function fitCanvas() {
      const wrap = canvas.parentElement;
      const w = Math.min(700, wrap.clientWidth || 700);
      const h = 220;
      const dpr = window.devicePixelRatio || 1;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "#111827";
      ctx.lineWidth = 7; //-- 笔触宽度
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }

    function pos(ev) {
      const r = canvas.getBoundingClientRect();
      const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
      const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
      return { x: clientX - r.left, y: clientY - r.top };
    }

    function startDraw(ev) {
      ev.preventDefault();
      drawing = true;
      const p = pos(ev);
      lastX = p.x; lastY = p.y;
    }
    function moveDraw(ev) {
      if (!drawing) return;
      ev.preventDefault();
      const p = pos(ev);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      lastX = p.x; lastY = p.y;
    }
    function endDraw(ev) {
      if (drawing) { ev.preventDefault(); }
      drawing = false;
    }

    canvas.addEventListener("mousedown", startDraw);
    canvas.addEventListener("mousemove", moveDraw);
    canvas.addEventListener("mouseup", endDraw);
    canvas.addEventListener("mouseleave", endDraw);
    canvas.addEventListener("touchstart", startDraw, { passive: false });
    canvas.addEventListener("touchmove", moveDraw, { passive: false });
    canvas.addEventListener("touchend", endDraw);

    $("btnClear").onclick = () => { fitCanvas(); $("submitInfo").innerHTML = ""; };
    fitCanvas();
    window.addEventListener("resize", () => { fitCanvas(); });

    function formatHandwritingOcrSummary(ocr) {
      const data = ocr && ocr.data;
      const text = data && data.text != null ? String(data.text) : "";
      const fields = data && data.fields;
      let conf = null;
      if (fields && fields["全文"] && typeof fields["全文"].confidence === "number") {
        conf = fields["全文"].confidence;
      } else if (fields && fields["置信度"] && fields["置信度"].value != null) {
        const v = fields["置信度"].value;
        conf = typeof v === "number" ? v : parseFloat(v);
        if (Number.isNaN(conf)) conf = null;
      }
      const confStr = conf != null ? conf.toFixed(4) : "—";
      return { text, confStr };
    }

    $("btnSubmit").onclick = () => {
      $("submitInfo").textContent = "提交中...";
      canvas.toBlob((blob) => {
        if (!blob || blob.size < 80) {
          $("submitInfo").textContent = "请先手写签名";
          return;
        }
        const fd = new FormData();
        fd.append("file", blob, "signature.png");
        fd.append("ocrBase", $("ocrBase").value.trim());
        fetch("/api/handwriting/submit", { method: "POST", body: fd })
          .then((r) => r.json().then((d) => ({ ok: r.ok, status: r.status, d })))
          .then(({ ok, status, d }) => {
            if (!ok) {
              $("submitInfo").textContent = "失败: " + (formatApiErr(d) || status);
              return;
            }
            const { text, confStr } = formatHandwritingOcrSummary(d.ocr);
            const line1 = "已保存 " + escapeHtml(d.fileName) + "，可下方浏览";
            const line2 = "识别文字：" + escapeHtml(text || "（空）");
            const line3 = "置信度：" + confStr;
            $("submitInfo").innerHTML = line1 + "<br>" + line2 + "<br>" + line3;
            loadPage(1);
          })
          .catch((e) => { $("submitInfo").textContent = "错误: " + e; });
      }, "image/png");
    };

    async function health() {
      const base = $("ocrBase").value.trim();
      const r = await fetch(`/api/health?ocrBase=${encodeURIComponent(base)}`);
      alert(JSON.stringify(await r.json()));
    }

    async function runBatch() {
      $("runInfo").textContent = "执行中...";
      const payload = { docType: DOC_TYPE, batchSize: parseInt($("batchSize").value, 10), ocrBase: $("ocrBase").value.trim() };
      const r = await fetch("/api/batch/run", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      let d;
      try {
        d = await r.json();
      } catch {
        $("runInfo").textContent = "批量失败: HTTP " + r.status;
        return;
      }
      if (!r.ok) {
        $("runInfo").textContent = "批量失败: " + (formatApiErr(d) || r.status);
        return;
      }
      $("runInfo").textContent = `已处理 ${d.processedCount}，失败 ${d.failedCount}，剩余 ${d.pendingAfterRun}`;
      await loadPage(1);
    }

    function totalPages(data) {
      if (!data || !data.total) return 1;
      const ps = data.pageSize || 20;
      return Math.max(1, Math.ceil(data.total / ps));
    }

    async function loadPage(page) {
      currentPage = Math.max(1, page);
      const size = parseInt($("pageSize").value, 10);
      const r = await fetch(`/api/batch/results?docType=${DOC_TYPE}&page=${currentPage}&pageSize=${size}`, {
        cache: "no-store",
      });
      lastData = await r.json();
      mediaBust = Date.now();
      const tp = totalPages(lastData);
      if (currentPage > tp) {
        currentPage = tp;
        return loadPage(currentPage);
      }
      $("stats").textContent = `总数:${lastData.total} 已识别 ${lastData.recognized} 未识别 ${lastData.unrecognized} 第 ${lastData.page}/${tp} 页`;
      renderResultList();
    }

    function renderResultList() {
      const box = $("resultList");
      const items = (lastData && lastData.items) || [];
      const tp = totalPages(lastData);
      $("pageInfo").textContent = `第 ${lastData.page} / ${tp} 页（本页 ${items.length} 条）`;
      $("pagePrev").disabled = lastData.page <= 1;
      $("pageNext").disabled = lastData.page >= tp;

      if (items.length === 0) {
        box.textContent = "当前页无数据（可先提交签名或放入图片）";
        return;
      }
      const q = (u) => (String(u).includes("?") ? "&" : "?");
      box.innerHTML = items
        .map(
          (it) =>
            `<div class="result-row">
  <div class="thumb-wrap"><img src="${it.imageUrl}${q(it.imageUrl)}v=${mediaBust}" alt="" loading="lazy" /></div>
  <div>
    <div class="meta"><strong>${escapeHtml(it.fileName)}</strong> ${it.jsonExists ? "[已识别]" : "[未识别]"}</div>
    <pre>${it.jsonExists ? escapeHtml(it.jsonText) : "尚未生成 .json（未识别）"}</pre>
  </div>
</div>`
        )
        .join("");
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    $("btnHealth").onclick = health;
    $("btnRun").onclick = runBatch;
    $("btnLoad").onclick = () => loadPage(currentPage);
    $("pagePrev").onclick = () => loadPage(currentPage - 1);
    $("pageNext").onclick = () => loadPage(currentPage + 1);
    $("pageSize").onchange = () => loadPage(1);
    loadPage(1);
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR 批量测试入口</title>
  <style>
    body{font-family:"Microsoft YaHei",Arial,sans-serif;background:#f4f6f8;margin:24px;}
    .card{max-width:860px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:20px;}
    a.btn{display:inline-block;margin:8px 8px 0 0;padding:10px 14px;background:#2563eb;color:#fff;text-decoration:none;border-radius:8px;}
    a.btn:hover{background:#1d4ed8;}
    code{background:#eef2ff;padding:2px 6px;border-radius:4px;}
  </style>
</head>
<body>
  <div class="card">
    <h1>OCR 批量测试入口</h1>
    <p>请选择测试页面：</p>
    <a class="btn" href="/batch/idcard">身份证批量测试</a>
    <a class="btn" href="/batch/vehicle_license">行驶证批量测试</a>
    <a class="btn" href="/batch/driver_license">驾驶证批量测试</a>
    <a class="btn" href="/batch/handwriting">手写签名识别测试</a>
    <hr />
    <p>测试数据目录：</p>
    <ul>
      <li><code>test/data/idcard</code></li>
      <li><code>test/data/VehicleLicense</code></li>
      <li><code>test/data/DrivingLicense</code></li>
      <li><code>test/data/HandWrite</code>（手写签名画布保存）</li>
    </ul>
  </div>
</body>
</html>
